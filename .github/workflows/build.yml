name: Build CV

on:
  push:
    paths:
      - "src/**"
      - "assets/**"
      - "Makefile"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          latexmk_use_xelatex: false

      - name: Build CV
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv
          path: output/*.pdf
